# CINEMAGIC-CAM - Codemagic CI/CD Pipeline
# Estrutura simplificada e validada
# ════════════════════════════════════════════════════════════════════════════════

workflows:
  android-build:
    name: Android Build Pipeline
    instance_type: linux_x2
    max_build_duration: 60

    environment:
      java: 17

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Setup and Clean
        script: |
          chmod +x gradlew || true
          # Use gradle command if gradlew not available
          gradle clean

      - name: Download dependencies
        script: |
          gradle dependencies

      - name: Build APK Free Release
        script: |
          gradle assembleFreeRelease

      - name: Build APK Pro Release
        script: |
          gradle assembleProRelease

      - name: Build APK Enterprise Release
        script: |
          gradle assembleEnterpriseRelease

      - name: Build App Bundle
        script: |
          gradle bundleProRelease

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - jvictor_barbosa@live.com
        notify:
          success: true
          failure: true
