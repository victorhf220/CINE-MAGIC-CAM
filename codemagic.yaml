# ════════════════════════════════════════════════════════════════════════════════
# CINEMAGIC-CAM - Codemagic CI/CD Pipeline
# Estrutura simplificada e validada
# ════════════════════════════════════════════════════════════════════════════════

workflows:
  android-build:
    name: Android Build Pipeline
    instance_type: linux_x2
    max_build_duration: 60

    environment:
      java: 17

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Fix gradle permission
        script: |
          chmod +x gradlew
          echo "✓ Gradlew permission fixed"

      - name: Check Gradle version
        script: |
          ./gradlew --version

      - name: Clean Gradle Cache
        script: |
          # Force clean gradle cache to ensure fresh download of gradle-8.7
          rm -rf ~/.gradle/wrapper/dists/gradle-8.1.1* || true
          rm -rf ~/.gradle/wrapper/dists/gradle-8.3.2* || true
          rm -rf ~/.gradle/wrapper/dists/gradle-8.4* || true
          echo "✓ Old Gradle versions removed from cache"
          
      - name: Setup Environment
        script: |
          # Create local.properties for CI/CD
          cat > local.properties << EOF
          sdk.dir=/opt/android-sdk
          keystore.path=$(pwd)/debug.keystore
          keystore.password=android
          key.alias=androiddebugkey
          key.password=android
          EOF
          echo "✓ local.properties created"
          
      - name: Clean project
        script: |
          ./gradlew clean

      - name: Download dependencies
        script: |
          ./gradlew dependencies

      - name: Build APK Free Release
        script: |
          ./gradlew assembleFreeRelease

      - name: Build APK Pro Release
        script: |
          ./gradlew assembleProRelease

      - name: Build APK Enterprise Release
        script: |
          ./gradlew assembleEnterpriseRelease

      - name: Build App Bundle
        script: |
          ./gradlew bundleProRelease

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - jvictor_barbosa@live.com
        notify:
          success: true
          failure: true
