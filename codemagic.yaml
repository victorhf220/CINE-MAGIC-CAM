workflows:
  android-build:
    name: Android Build — APK & AAB
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      java: 17

    scripts:
      # ─── PASSO 1: Corrigir gradle-wrapper.jar se ausente ───────────────────
      - name: Fix — Restaurar gradle-wrapper.jar
        script: |
          set -e
          echo "📦 Verificando gradle-wrapper.jar..."
          
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ] || [ ! -s "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "⚠️  gradle-wrapper.jar AUSENTE ou INVÁLIDO. Recuperando..."
            mkdir -p gradle/wrapper
            
            # Baixa Gradle 8.7 e extrai o JAR
            GRADLE_VERSION="8.7"
            curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/
            cp /tmp/gradle-${GRADLE_VERSION}/lib/gradle-wrapper-shared-${GRADLE_VERSION}.jar gradle/wrapper/gradle-wrapper.jar
            rm -rf /tmp/gradle-${GRADLE_VERSION} /tmp/gradle.zip
            echo "✅ gradle-wrapper.jar restaurado!"
          else
            echo "✅ gradle-wrapper.jar OK"
          fi
          
          chmod +x gradlew gradlew.bat

      # ─── PASSO 2: Verificar Gradle ──────────────────────────────────────────
      - name: Check Gradle version
        script: |
          ./gradlew --version

      # ─── PASSO 3: Verificar ambiente ────────────────────────────────────────
      - name: Setup environment
        script: |
          echo "☕ Java version:"
          java -version
          echo "📱 Android SDK:"
          echo "  ANDROID_HOME = $ANDROID_HOME"
          echo "  Creating local.properties..."
          echo "sdk.dir=/opt/android-sdk" > local.properties

      # ─── PASSO 4: Limpar projeto ─────────────────────────────────────────────
      - name: Clean project
        script: |
          ./gradlew clean --no-daemon --stacktrace

      # ─── PASSO 5: Build Debug APK ────────────────────────────────────────────
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ─── PASSO 6: Build Release AAB ──────────────────────────────────────────
      - name: Build Release AAB
        script: |
          ./gradlew bundleRelease --no-daemon --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/outputs/bundle/release/*.aab

    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - $HOME/.android/build-cache
